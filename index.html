<script>
// ─── Constants ────────────────────────────────────────────────
const HEX_DIRS = [
  [1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]
];
const PLAYER_COLORS = {
  0: '#2a2a3a',
  1: '#ff4444',
  2: '#4488ff',
  3: '#44cc44',
  4: '#f0c040'
};
const PLAYER_NAMES = { 1: '紅色', 2: '藍色', 3: '綠色', 4: '黃色' };
const WIN_LENGTH = 7; // pieces in a line to win
const LINE_AXES = [[1,0],[0,1],[1,-1]]; // 3 hex axes (each covers both directions)
const GRID_RADIUS = 6; // hexes from center
const HEX_SIZE = 26;

// ─── State ────────────────────────────────────────────────────
let GS; // GameState
let isScanningActive = false;
let hoverCell = null;
let botTimeout = null;
let animQueue = [];
let currentDifficulty = 'medium'; // easy | medium | hard

const DIFFICULTY = {
  easy:   { noiseChance: 0.65, flipWeight: 1, penetrateBonus: 5,  coreBonus: 10, blockBonus: 8  },
  medium: { noiseChance: 0.20, flipWeight: 2, penetrateBonus: 15, coreBonus: 25, blockBonus: 30 },
  hard:   { noiseChance: 0.00, flipWeight: 3, penetrateBonus: 25, coreBonus: 50, blockBonus: 60 },
};

// ─── Canvas Setup ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function hexToPixel(q, r) {
  const x = HEX_SIZE * (3/2 * q);
  const y = HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r);
  return { x: x + canvas.width/2, y: y + canvas.height/2 };
}

function pixelToHex(px, py) {
  const x = px - canvas.width/2;
  const y = py - canvas.height/2;
  const q = (2/3 * x) / HEX_SIZE;
  const r = (-1/3 * x + Math.sqrt(3)/3 * y) / HEX_SIZE;
  return roundHex(q, r);
}

function roundHex(q, r) {
  const s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq-q), dr = Math.abs(rr-r), ds = Math.abs(rs-s);
  if (dq > dr && dq > ds) rq = -rr-rs;
  else if (dr > ds) rr = -rq-rs;
  return { q: rq, r: rr };
}

function key(q, r) { return `${q},${r}`; }

// ─── Grid Generation ──────────────────────────────────────────
function generateGrid(radius) {
  const grid = new Map();
  for (let q = -radius; q <= radius; q++) {
    for (let r = Math.max(-radius, -q-radius); r <= Math.min(radius, -q+radius); r++) {
      grid.set(key(q, r), { q, r, player: 0, isCore: false });
    }
  }
  return grid;
}

// ─── Counter Chain (random permutation) ───────────────────────
function generateCounterChain(alivePlayers) {
  const players = [...(alivePlayers || [1, 2, 3, 4])];
  for (let i = players.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [players[i], players[j]] = [players[j], players[i]];
  }
  const chain = {};
  for (let i = 0; i < players.length; i++) {
    chain[players[i]] = players[(i + 1) % players.length];
  }
  return chain;
}

// Returns 'counters' | 'countered' | 'neutral'
function relationship(attacker, defender) {
  if (GS.counterChain[attacker] === defender) return 'counters';
  if (GS.counterChain[defender] === attacker) return 'countered';
  return 'neutral';
}

function revealRelationship(attacker, defender) {
  const k = `${attacker}→${defender}`;
  if (!GS.revealedRelationships.has(k)) {
    GS.revealedRelationships.add(k);
    updateChainDisplay();
  }
}

// ─── Initial Core Placement ───────────────────────────────────
const CORNER_ZONES = [
  [{q:-3,r:1},{q:-3,r:2},{q:-2,r:3}], // P1 zone (top-left)
  [{q:3,r:-1},{q:3,r:-2},{q:2,r:-3}], // P2 zone (bottom-right)
  [{q:1,r:-3},{q:2,r:-3},{q:-1,r:3}], // P3 zone (top-right)
  [{q:-1,r:3},{q:-2,r:3},{q:1,r:-3}], // P4 zone (bottom-left)
];

function hexDistance(q1, r1, q2, r2) {
  return (Math.abs(q1-q2) + Math.abs(q1+r1-q2-r2) + Math.abs(r1-r2)) / 2;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function scatterNeutralCores() {
  // Place 12 neutral cores (player=0, isCore=true) spread across the board
  const candidates = [];
  for (const [k, cell] of GS.grid) {
    const d = hexDistance(0, 0, cell.q, cell.r);
    if (d >= 1 && d <= 5) candidates.push({ q: cell.q, r: cell.r });
  }
  shuffle(candidates);

  // Pick 12 positions with minimum distance 2 apart
  const chosen = [];
  for (const c of candidates) {
    if (chosen.every(x => hexDistance(x.q, x.r, c.q, c.r) >= 2)) {
      chosen.push(c);
      if (chosen.length === 12) break;
    }
  }
  chosen.forEach(pos => {
    const cell = GS.grid.get(key(pos.q, pos.r));
    cell.isCore = true; // player stays 0 = unclaimed
  });
}

function placeStartingPieces() {
  // d=2 ring has exactly 12 cells — assign ABCDABCDABCD interleaved
  // so all 4 players mix immediately, enabling Othello sandwiches from turn 1
  const ring = [];
  for (const [k, cell] of GS.grid) {
    if (hexDistance(0, 0, cell.q, cell.r) === 2 && !cell.isCore && cell.player === 0)
      ring.push({ q: cell.q, r: cell.r });
  }
  shuffle(ring);
  for (let i = 0; i < Math.min(12, ring.length); i++) {
    const cell = GS.grid.get(key(ring[i].q, ring[i].r));
    if (cell && cell.player === 0) cell.player = (i % 4) + 1;
  }
}

// ─── Game Initialization ──────────────────────────────────────
function initGame() {
  const counterChain = generateCounterChain();
  GS = {
    grid: generateGrid(GRID_RADIUS),
    currentPlayer: 1,
    counterChain,
    playerStatus: {
      1: { isAlive: true, remainingScans: 3, isBot: false, desperationUsed: 0 },
      2: { isAlive: true, remainingScans: 3, isBot: true,  desperationUsed: 0 },
      3: { isAlive: true, remainingScans: 3, isBot: true,  desperationUsed: 0 },
      4: { isAlive: true, remainingScans: 3, isBot: true,  desperationUsed: 0 }
    },
    config: { coresPerPlayer: 3, maxScansCarry: 3, maxDesperation: 3 },
    revealedRelationships: new Set(),
    turnCount: 0,
    gameOver: false
  };

  scatterNeutralCores();
  placeStartingPieces();
  isScanningActive = false;
  hoverCell = null;
  updateChainDisplay();
  updateUI();
  render();
  scheduleBot();
}

// ─── Hex Neighbors ────────────────────────────────────────────
function neighbors(q, r) {
  return HEX_DIRS.map(([dq,dr]) => ({ q: q+dq, r: r+dr }))
    .filter(({q,r}) => GS.grid.has(key(q,r)));
}

function isFullySurrounded(q, r) {
  return HEX_DIRS.every(([dq,dr]) => {
    const k = key(q+dq, r+dr);
    if (!GS.grid.has(k)) return true; // edge counts as blocked
    return GS.grid.get(k).player !== 0;
  });
}

// ─── Raycast Logic ────────────────────────────────────────────
// Returns { toFlip: [{q,r}], rayCasts: [{dir,cells,blocked}] } for a placement
function resolveRaycast(placerPlayer, pq, pr) {
  const toFlip = [];
  const rayCasts = [];

  for (const [dq, dr] of HEX_DIRS) {
    const line = [];
    let q = pq + dq, r = pr + dr;
    let blocked = false;
    let penetratedCore = false;

    let rayDone = false;
    while (GS.grid.has(key(q, r)) && !rayDone) {
      const cell = GS.grid.get(key(q, r));

      // Unclaimed core: transparent
      if (cell.player === 0 && cell.isCore) { q += dq; r += dr; continue; }

      // Empty cell: stop
      if (cell.player === 0) {
        rayCasts.push({ dir: [dq,dr], cells: [...line], blocked: true });
        rayDone = true; break;
      }

      // Own piece: close sandwich
      if (cell.player === placerPlayer) {
        if (line.length > 0) {
          rayCasts.push({ dir: [dq,dr], cells: [...line], blocked: false });
          line.forEach(c => {
            if (!toFlip.find(f => f.q===c.q && f.r===c.r)) toFlip.push(c);
          });
        }
        rayDone = true; break;
      }

      // Enemy piece — check relationship (Option C)
      const rel = relationship(placerPlayer, cell.player);
      if (cell.isCore) {
        if (rel === 'counters') {
          // PENETRATE — reveal this relationship
          line.push({ q, r, isCore: true, corePlayer: cell.player, penetrated: true });
        } else {
          // BLOCK (neutral or countered)
          rayCasts.push({ dir: [dq,dr], cells: [...line], blocked: true });
          rayDone = true; break;
        }
      } else {
        if (rel === 'countered') {
          // Cannot flip this colour's pieces — ray stops
          rayCasts.push({ dir: [dq,dr], cells: [...line], blocked: true });
          rayDone = true; break;
        }
        line.push({ q, r, isCore: false });
      }
      q += dq; r += dr;
    }
    // Ray exited grid with unresolved line
    if (!rayDone && line.length > 0) {
      rayCasts.push({ dir: [dq,dr], cells: [...line], blocked: true });
    }
  }

  // Remove cores themselves from flip list (they don't change color on penetration)
  const actualFlips = toFlip.filter(c => {
    const cell = GS.grid.get(key(c.q, c.r));
    return !cell.isCore;
  });

  return { toFlip: actualFlips, rayCasts };
}

// ─── Direct Attack ────────────────────────────────────────────
// Returns list of adjacent enemy pieces directly capturable (countered colour, non-core)
function getDirectAttacks(player, q, r) {
  return neighbors(q, r).filter(nb => {
    const c = GS.grid.get(key(nb.q, nb.r));
    return c && c.player !== 0 && c.player !== player
      && !c.isCore
      && relationship(player, c.player) === 'counters';
  });
}

// ─── Valid Moves ───────────────────────────────────────────────
function getValidMoves(player) {
  if (!GS.playerStatus[player].isAlive) return [];
  const moves = [];

  for (const [k, cell] of GS.grid) {
    if (cell.player !== 0) continue;

    // Unclaimed core: claimable only if adjacent to any existing piece
    if (cell.isCore && cell.player === 0) {
      const adjAny = neighbors(cell.q, cell.r).some(nb => {
        const c = GS.grid.get(key(nb.q, nb.r));
        return c && c.player !== 0;
      });
      if (adjAny) moves.push({ q: cell.q, r: cell.r, isClaim: true });
      continue;
    }

    const { toFlip } = resolveRaycast(player, cell.q, cell.r);
    const directHits = getDirectAttacks(player, cell.q, cell.r);
    if (toFlip.length === 0 && directHits.length === 0) continue;

    moves.push({ q: cell.q, r: cell.r, hasDirectAttack: directHits.length > 0 });
  }
  return moves;
}

// Emergency desperation moves (adjacent to own cores, limited uses)
function getDesperationMoves(player) {
  if (GS.playerStatus[player].desperationUsed >= GS.config.maxDesperation) return [];
  const moves = [];
  for (const [k, cell] of GS.grid) {
    if (cell.player !== player || !cell.isCore) continue;
    for (const nb of neighbors(cell.q, cell.r)) {
      const nc = GS.grid.get(key(nb.q, nb.r));
      if (nc && nc.player === 0 && !nc.isCore) {
        if (!moves.find(m => m.q===nb.q && m.r===nb.r)) {
          moves.push({ q: nb.q, r: nb.r, isDesperation: true });
        }
      }
    }
  }
  return moves;
}

// ─── Place Piece ──────────────────────────────────────────────
function placeAndFlip(player, q, r, isDesperation = false) {
  const cell = GS.grid.get(key(q, r));

  // Claiming an unclaimed core — just assign ownership, no flip
  if (cell.isCore && cell.player === 0) {
    cell.player = player;
    return;
  }

  cell.player = player;
  cell.isCore = false;

  if (isDesperation) {
    GS.playerStatus[player].desperationUsed++;
  } else {
    // Sandwich flips
    const { toFlip } = resolveRaycast(player, q, r);
    toFlip.forEach(({ q: fq, r: fr }) => {
      GS.grid.get(key(fq, fr)).player = player;
    });
    // Direct attack: flip adjacent countered-colour pieces (non-core)
    getDirectAttacks(player, q, r).forEach(({ q: aq, r: ar }) => {
      GS.grid.get(key(aq, ar)).player = player;
    });
  }
}

// ─── Defeat Check ─────────────────────────────────────────────
function checkDefeat(player) {
  if (!GS.playerStatus[player].isAlive) return;

  const coreCells = [];
  for (const [k, cell] of GS.grid) {
    if (cell.player === player && cell.isCore) coreCells.push(cell);
  }

  // No claimed cores yet (early game) — not defeated, just vulnerable
  if (coreCells.length === 0) {
    const noMoves = getValidMoves(player).length === 0 && getDesperationMoves(player).length === 0;
    if (noMoves) eliminatePlayer(player);
    return;
  }

  const allCoresSurrounded = coreCells.every(c => isFullySurrounded(c.q, c.r));
  const noValidMoves = getValidMoves(player).length === 0;
  const noDesperationMoves = getDesperationMoves(player).length === 0;

  if (allCoresSurrounded && noValidMoves && noDesperationMoves) {
    eliminatePlayer(player);
  }
}

function eliminatePlayer(player) {
  GS.playerStatus[player].isAlive = false;
  for (const [k, cell] of GS.grid) {
    if (cell.player === player) {
      cell.player = 0;
      cell.isCore = false;
    }
  }

  const alive = [1,2,3,4].filter(p => GS.playerStatus[p].isAlive);
  if (alive.length >= 2) {
    GS.counterChain = generateCounterChain(alive);
    GS.revealedRelationships = new Set();
    updateChainDisplay();
    setStatus(`${PLAYER_NAMES[player]}玩家被淘汰！克制鏈重新洗牌！`);
  } else {
    setStatus(`${PLAYER_NAMES[player]}玩家被淘汰！`);
  }
}

// ─── Connection Check ─────────────────────────────────────────
function checkConnection(player) {
  for (const [dq, dr] of LINE_AXES) {
    for (const [k, cell] of GS.grid) {
      if (cell.player !== player) continue;
      // Only start from the beginning of a line
      const prevCell = GS.grid.get(key(cell.q - dq, cell.r - dr));
      if (prevCell && prevCell.player === player) continue;
      // Count consecutive
      let count = 1, q = cell.q + dq, r = cell.r + dr;
      while (GS.grid.has(key(q, r)) && GS.grid.get(key(q, r)).player === player) {
        count++; q += dq; r += dr;
      }
      if (count >= WIN_LENGTH) return true;
    }
  }
  return false;
}

// ─── Win Check ────────────────────────────────────────────────
function checkWin() {
  const alive = [1,2,3,4].filter(p => GS.playerStatus[p].isAlive);
  // Connection win: any alive player has 7 in a line
  for (const p of alive) {
    if (checkConnection(p)) {
      GS.gameOver = true;
      showOverlay(p, '🔗 連線勝利！');
      return true;
    }
  }
  // Elimination win: last player standing
  if (alive.length === 1) {
    GS.gameOver = true;
    showOverlay(alive[0], '💀 淘汰勝利！');
    return true;
  }
  return false;
}

// ─── Turn Management ──────────────────────────────────────────
function nextPlayer() {
  let next = GS.currentPlayer;
  for (let i = 0; i < 4; i++) {
    next = (next % 4) + 1;
    if (GS.playerStatus[next].isAlive) break;
  }
  GS.currentPlayer = next;
}

function autoRevealChain() {
  // Reveal one unrevealed relationship per milestone turn
  const c = GS.counterChain;
  const alive = [1,2,3,4].filter(p => GS.playerStatus[p].isAlive);
  for (const p of alive) {
    const k = `${p}→${c[p]}`;
    if (!GS.revealedRelationships.has(k)) {
      GS.revealedRelationships.add(k);
      updateChainDisplay();
      setStatus(`📢 第 ${GS.turnCount} 回合情報：${PLAYER_NAMES[p]} 克制 ${PLAYER_NAMES[c[p]]}！`);
      return; // one reveal per milestone
    }
  }
}

function executeTurn(player, q, r, isDesperation = false) {
  if (GS.gameOver) return;
  placeAndFlip(player, q, r, isDesperation);
  GS.turnCount++;
  const aliveCount = [1,2,3,4].filter(p => GS.playerStatus[p].isAlive).length;
  const interval = aliveCount * 2; // reveal every 2 full rounds
  if (GS.turnCount % interval === 0) {
    autoRevealChain();
  }
  checkDefeat(player);
  // Check other players too (cascading defeats)
  [1,2,3,4].forEach(p => { if (p !== player) checkDefeat(p); });
  if (checkWin()) return;
  nextPlayer();
  updateUI();
  render();
  scheduleBot();
}

function handleHumanMove(q, r) {
  if (GS.gameOver) return;
  const player = GS.currentPlayer;
  if (GS.playerStatus[player].isBot) return;

  const validMoves = getValidMoves(player);
  const isValid = validMoves.find(m => m.q===q && m.r===r);
  if (isValid) {
    executeTurn(player, q, r, false);
    return;
  }

  // Try desperation
  if (validMoves.length === 0) {
    const desp = getDesperationMoves(player);
    const isDespValid = desp.find(m => m.q===q && m.r===r);
    if (isDespValid) {
      executeTurn(player, q, r, true);
      return;
    }
  }

  setStatus('無效落子！請嘗試其他位置。');
}

// ─── Bot Logic ────────────────────────────────────────────────
function scheduleBot() {
  if (GS.gameOver) return;
  const cp = GS.currentPlayer;
  if (GS.playerStatus[cp].isBot && GS.playerStatus[cp].isAlive) {
    botTimeout = setTimeout(() => executeBotTurn(cp), 600);
  }
}

function simulateFlipCount(botPlayer, move) {
  const { toFlip } = resolveRaycast(botPlayer, move.q, move.r);
  return toFlip.length;
}

function willPenetrateEnemyCore(botPlayer, move) {
  for (const [dq, dr] of HEX_DIRS) {
    let q = move.q + dq, r = move.r + dr;
    while (GS.grid.has(key(q, r))) {
      const cell = GS.grid.get(key(q, r));
      if (cell.player === 0) break;
      if (cell.isCore && relationship(botPlayer, cell.player) === 'counters') return true;
      q += dq; r += dr;
    }
  }
  return false;
}

function isAdjacentToOwnCore(botPlayer, move) {
  return neighbors(move.q, move.r).some(nb => {
    const c = GS.grid.get(key(nb.q, nb.r));
    return c && c.player === botPlayer && c.isCore;
  });
}

// Returns 0-1 score: how much placing at (move.q,move.r) blocks opponent longest lines
function blockScore(botPlayer, move) {
  let best = 0;
  const axes = [[1,0],[0,1],[1,-1]];
  const opponents = [1,2,3,4].filter(p => p !== botPlayer && GS.playerStatus[p].isAlive);
  for (const opp of opponents) {
    for (const [dq, dr] of axes) {
      // Measure opp's current run through this cell on this axis
      let run = 0;
      for (const sign of [1, -1]) {
        let q = move.q + dq * sign, r = move.r + dr * sign;
        while (GS.grid.has(key(q, r)) && GS.grid.get(key(q, r)).player === opp) {
          run++; q += dq * sign; r += dr * sign;
        }
      }
      // Normalise: a run of WIN_LENGTH-1 adjacent pieces = score 1
      const threat = run / (WIN_LENGTH - 1);
      if (threat > best) best = threat;
    }
  }
  return Math.min(best, 1);
}

function evaluateMoves(botPlayer) {
  let validMoves = getValidMoves(botPlayer);
  if (validMoves.length === 0) validMoves = getDesperationMoves(botPlayer);
  const d = DIFFICULTY[currentDifficulty];
  let bestMove = null;
  let maxScore = -Infinity;

  for (const move of validMoves) {
    let score = 0;
    if (move.isClaim) {
      // Claiming a neutral core is always high priority
      score += 40;
    } else {
      score += simulateFlipCount(botPlayer, move) * d.flipWeight;
      score += getDirectAttacks(botPlayer, move.q, move.r).length * d.flipWeight * 1.5;
      if (willPenetrateEnemyCore(botPlayer, move)) score += d.penetrateBonus;
      if (isAdjacentToOwnCore(botPlayer, move)) score += d.coreBonus;
      score += blockScore(botPlayer, move) * d.blockBonus;
    }
    if (score > maxScore) { maxScore = score; bestMove = move; }
  }

  if (Math.random() < d.noiseChance && validMoves.length > 0) {
    return validMoves[Math.floor(Math.random() * validMoves.length)];
  }
  return bestMove;
}

function executeBotTurn(botPlayer) {
  if (GS.gameOver || !GS.playerStatus[botPlayer].isAlive) return;
  const move = evaluateMoves(botPlayer);
  if (!move) {
    // No moves at all — check defeat
    checkDefeat(botPlayer);
    if (!checkWin()) { nextPlayer(); updateUI(); render(); scheduleBot(); }
    return;
  }
  setStatus(`${PLAYER_NAMES[botPlayer]}機器人落子 (${move.q},${move.r})`);
  executeTurn(botPlayer, move.q, move.r, !!move.isDesperation);
}

// ─── Scan ─────────────────────────────────────────────────────
// scanArmed = 已開啟但未消耗次數；首次懸停到空格才扣次數
let scanArmed = false;

function toggleScan() {
  const player = GS.currentPlayer;
  if (GS.playerStatus[player].isBot) return;
  if (!isScanningActive) {
    if (GS.playerStatus[player].remainingScans <= 0) {
      setStatus('掃描次數已用完！');
      return;
    }
    isScanningActive = true;
    scanArmed = true; // 次數未扣，等第一次懸停才扣
    document.getElementById('btn-scan').classList.add('active');
    setStatus('掃描模式啟動 — 懸停在空格上查看射線（懸停時才消耗次數）。');
  } else {
    isScanningActive = false;
    scanArmed = false;
    document.getElementById('btn-scan').classList.remove('active');
    setStatus('掃描模式關閉。');
  }
  updateUI();
  render();
}

function consumeScanCharge() {
  if (!scanArmed) return;
  const player = GS.currentPlayer;
  GS.playerStatus[player].remainingScans--;
  scanArmed = false;
  updateUI();
}

// ─── Rendering ────────────────────────────────────────────────
function drawHex(x, y, size, fillColor, strokeColor, alpha = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i - 30);
    const px = x + size * Math.cos(angle);
    const py = y + size * Math.sin(angle);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const player = GS.currentPlayer;
  const validMoves = (!GS.playerStatus[player].isBot && !GS.gameOver)
    ? getValidMoves(player) : [];
  const despMoves = validMoves.length === 0 && !GS.playerStatus[player].isBot && !GS.gameOver
    ? getDesperationMoves(player) : [];

  // Draw scan rays if hovering
  if (isScanningActive && hoverCell) {
    const { rayCasts } = resolveRaycast(player, hoverCell.q, hoverCell.r);
    const { x: ox, y: oy } = hexToPixel(hoverCell.q, hoverCell.r);

    // Build a map of dir→rayCast result for easy lookup
    const dirMap = {};
    for (const ray of rayCasts) {
      dirMap[ray.dir.join(',')] = ray;
    }

    // Show all 6 directions
    for (const [dq, dr] of HEX_DIRS) {
      const ray = dirMap[`${dq},${dr}`];

      // Find the farthest reachable cell in this direction
      let eq = hoverCell.q + dq, er = hoverCell.r + dr;
      let lastValid = null;
      while (GS.grid.has(key(eq, er))) { lastValid = { q: eq, r: er }; eq += dq; er += dr; }

      if (!lastValid) continue; // direction goes off-grid immediately

      if (!ray || ray.cells.length === 0) {
        // Dead-end direction (empty or no enemies) — dim gray line
        const { x: lx, y: ly } = hexToPixel(lastValid.q, lastValid.r);
        ctx.save();
        ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(lx, ly);
        ctx.strokeStyle = '#44446688'; ctx.lineWidth = 1;
        ctx.setLineDash([2, 6]); ctx.stroke();
        ctx.restore();
        continue;
      }

      const last = ray.cells[ray.cells.length - 1];
      const { x: lx, y: ly } = hexToPixel(last.q, last.r);
      ctx.save();
      ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(lx, ly);
      ctx.strokeStyle = ray.blocked ? '#ff4444' : '#44ff88';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]); ctx.stroke();
      if (ray.blocked) {
        ctx.font = '16px sans-serif';
        ctx.fillStyle = '#ff4444';
        ctx.fillText('✕', lx - 8, ly + 6);
      }
      ctx.restore();
    }
  }

  // Draw cells
  for (const [k, cell] of GS.grid) {
    const { x, y } = hexToPixel(cell.q, cell.r);
    const isValid = validMoves.find(m => m.q===cell.q && m.r===cell.r);
    const isDesp = despMoves.find(m => m.q===cell.q && m.r===cell.r);
    const isHover = hoverCell && hoverCell.q===cell.q && hoverCell.r===cell.r;

    let fill = PLAYER_COLORS[cell.player];
    let stroke = '#444';
    let alpha = 1;

    // Highlight adjacent cells that would be directly attacked on hover
    const isDirectVictim = isScanningActive && hoverCell && !hoverCell.isOwn &&
      cell.player !== 0 && cell.player !== player && !cell.isCore &&
      relationship(player, cell.player) === 'counters' &&
      neighbors(hoverCell.q, hoverCell.r).some(nb => nb.q === cell.q && nb.r === cell.r);

    if (cell.player === 0) {
      fill = '#1e1e30';
      if (isValid && isValid.hasDirectAttack) { fill = '#2a1a1a'; stroke = '#ff6644'; }
      else if (isValid) { fill = '#2a3a4a'; stroke = '#6090ff'; }
      if (isDesp) { fill = '#3a2a1a'; stroke = '#f0c040'; }
    }
    if (isDirectVictim) { stroke = '#ff6644'; }
    if (isHover) { stroke = '#ffffff'; }

    drawHex(x, y, HEX_SIZE - 2, fill, stroke, alpha);

    // Show core indicator (only for current human player's own cores)
    if (cell.isCore && (cell.player === player && !GS.playerStatus[player].isBot)) {
      ctx.save();
      ctx.font = `bold ${HEX_SIZE * 0.55}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.85;
      ctx.fillText('◆', x, y);
      ctx.restore();
    } else if (cell.player === 0 && cell.isCore) {
      // Unclaimed neutral core — gray hollow diamond
      ctx.save();
      ctx.font = `bold ${HEX_SIZE * 0.6}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#aaaaaa';
      ctx.globalAlpha = 0.9;
      ctx.fillText('◇', x, y);
      ctx.restore();
    } else if (cell.player !== 0) {
      // Small dot to show occupation
      ctx.beginPath();
      ctx.arc(x, y, HEX_SIZE * 0.22, 0, Math.PI * 2);
      ctx.fillStyle = PLAYER_COLORS[cell.player];
      ctx.fill();
      ctx.strokeStyle = '#ffffff33';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Coord label (debug — tiny)
    // ctx.fillStyle = '#555'; ctx.font = '8px sans-serif';
    // ctx.textAlign = 'center'; ctx.fillText(`${cell.q},${cell.r}`, x, y+14);
  }
}

// ─── UI ───────────────────────────────────────────────────────
function updateUI() {
  const cardIds = [1,2,3,4];
  cardIds.forEach(p => {
    const card = document.getElementById(`card-${p}`);
    const info = document.getElementById(`card-${p}-info`);
    card.classList.toggle('active', GS.currentPlayer === p && !GS.gameOver);
    card.classList.toggle('dead', !GS.playerStatus[p].isAlive);

    let coreCount = 0;
    for (const [k, cell] of GS.grid) {
      if (cell.player === p && cell.isCore) coreCount++;
    }
    const scans = GS.playerStatus[p].remainingScans;
    const despLeft = GS.config.maxDesperation - GS.playerStatus[p].desperationUsed;
    info.textContent = `核心: ${coreCount} | 掃描: ${scans} | 緊急: ${despLeft}`;
  });

  const p = GS.currentPlayer;
  const scans = GS.playerStatus[p].remainingScans;
  document.getElementById('btn-scan').textContent = `🔍 雷達掃描 (${scans})`;

  const despBanner = document.getElementById('desp-banner');
  if (!GS.gameOver) {
    const isBot = GS.playerStatus[p].isBot;
    if (!isBot) {
      const vm = getValidMoves(p);
      const dm = vm.length === 0 ? getDesperationMoves(p) : [];
      if (vm.length > 0) {
        setStatus(`${PLAYER_NAMES[p]}玩家回合 — 請落子。`);
        despBanner.style.display = 'none';
      } else if (dm.length > 0) {
        const despLeft = GS.config.maxDesperation - GS.playerStatus[p].desperationUsed;
        setStatus('');
        despBanner.querySelector('b').textContent = `橙色鄰格（剩餘 ${despLeft} 次）`;
        despBanner.style.display = 'block';
      } else {
        setStatus(`${PLAYER_NAMES[p]}玩家無任何走法，正在檢查淘汰...`);
        despBanner.style.display = 'none';
      }
    } else {
      despBanner.style.display = 'none';
    }
  } else {
    despBanner.style.display = 'none';
  }
}

function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

function updateChainDisplay() {
  const c = GS.counterChain;
  const names = { 1:'紅', 2:'藍', 3:'綠', 4:'黃' };
  const revealed = [];
  for (let p = 1; p <= 4; p++) {
    if (GS.revealedRelationships.has(`${p}→${c[p]}`)) {
      revealed.push(`${names[p]}→${names[c[p]]}`);
    }
  }
  const el = document.getElementById('chain-display');
  el.textContent = revealed.length > 0
    ? '已發現克制: ' + revealed.join(' | ')
    : '克制鏈: 未知 — 靠試探或雷達發現';
}

function showOverlay(winnerPlayer, winType = '勝利！') {
  document.getElementById('overlay-title').textContent =
    `${PLAYER_NAMES[winnerPlayer]} 勝利！`;
  let territory = 0;
  for (const [k, cell] of GS.grid) {
    if (cell.player === winnerPlayer) territory++;
  }
  document.getElementById('overlay-msg').textContent =
    `${winType}  佔領 ${territory} 格領土`;
  document.getElementById('overlay').classList.add('show');
}

function startGame(difficulty) {
  currentDifficulty = difficulty;
  document.getElementById('menu-overlay').classList.add('hidden');
  if (botTimeout) clearTimeout(botTimeout);
  initGame();
}

function restartGame() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('menu-overlay').classList.remove('hidden');
}

// ─── Canvas Sizing ────────────────────────────────────────────
function resizeCanvas() {
  const size = Math.min(window.innerWidth - 20, 660);
  canvas.width = size;
  canvas.height = size;
  render();
}

// ─── Event Listeners ──────────────────────────────────────────
canvas.addEventListener('click', e => {
  if (!GS || GS.gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const { q, r } = pixelToHex(px, py);
  if (!GS.grid.has(key(q, r))) return;
  if (multiplayerMode) handleHumanMoveMultiplayer(q, r);
  else handleHumanMove(q, r);
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top) * scaleY;
  const { q, r } = pixelToHex(px, py);
  const k = key(q, r);
  if (GS.grid.has(k) && GS.grid.get(k).player === 0) {
    hoverCell = { q, r };
    // Consume scan charge on first hover over an empty cell
    if (isScanningActive && scanArmed) consumeScanCharge();
  } else {
    hoverCell = null;
  }
  render();
});

canvas.addEventListener('mouseleave', () => {
  hoverCell = null;
  render();
});

document.getElementById('btn-scan').addEventListener('click', toggleScan);
document.getElementById('btn-restart').addEventListener('click', restartGame);
window.addEventListener('resize', resizeCanvas);

// ─── Boot ─────────────────────────────────────────────────────
resizeCanvas();
// Game init deferred until lobby choice

// ─── Lobby & Firebase Multiplayer ─────────────────────────────
let myPlayerNum  = null;   // 1-4, this client's slot
let isHost       = false;
let multiplayerMode = false;
let roomRef      = null;   // Firebase ref to current room
let lastMoveKey  = null;   // ignore own move echo

function lobbyStartSolo() {
  document.getElementById('lobby-overlay').style.display = 'none';
  document.getElementById('menu-overlay').style.display = 'flex';
}

function lobbyShowJoin() {
  const row = document.getElementById('lobby-join-row');
  row.style.display = row.style.display === 'none' ? 'flex' : 'none';
}

function lobbyCreate() {
  const roomId = Math.random().toString(36).slice(2, 8).toUpperCase();
  fbReady(() => connectToRoom(roomId, true));
}

function lobbyJoin() {
  const code = document.getElementById('lobby-code-input').value.trim().toUpperCase();
  if (code.length < 4) { alert('請輸入房間號碼'); return; }
  fbReady(() => connectToRoom(code, false));
}

// Wait for Firebase module to load before using it
function fbReady(fn) {
  if (window._fbReady) { fn(); return; }
  document.addEventListener('fb-ready', fn, { once: true });
}

async function connectToRoom(roomId, asHost) {
  const { ref, set, get, update, onValue, db } = window._fb;
  isHost = asHost;
  multiplayerMode = true;
  roomRef = ref(db, `rooms/${roomId}`);

  if (asHost) {
    // Create fresh room
    await set(roomRef, {
      slots: { 1: { name: '房主', isBot: false }, 2: null, 3: null, 4: null },
      currentPlayer: 1,
      gameStarted: false,
      gameOver: false,
      lastMove: null,
      difficulty: null,
    });
    myPlayerNum = 1;
  } else {
    // Join existing room — take first empty slot
    const snap = await get(roomRef);
    if (!snap.exists()) { alert('房間唔存在！'); multiplayerMode = false; return; }
    const data = snap.val();
    let slot = null;
    for (let p = 2; p <= 4; p++) {
      if (!data.slots || !data.slots[p]) { slot = p; break; }
    }
    if (!slot) { alert('房間已滿！'); multiplayerMode = false; return; }
    myPlayerNum = slot;
    await update(ref(db, `rooms/${roomId}/slots`), {
      [slot]: { name: `玩家${slot}`, isBot: false }
    });
  }

  document.getElementById('lobby-room-code').textContent = roomId;
  document.getElementById('lobby-room-info').style.display = 'block';
  document.getElementById('lobby-join-row').style.display = 'none';
  if (asHost) document.getElementById('lobby-start-btn').style.display = 'block';

  // Listen for room changes
  onValue(roomRef, snap => {
    if (!snap.exists()) return;
    handleRoomUpdate(snap.val(), roomId);
  });
}

function handleRoomUpdate(data, roomId) {
  const { ref, update, db } = window._fb;

  // Update lobby player list
  updateLobbyPlayers(data.slots || {});

  // Game started — close lobby
  if (data.gameStarted && document.getElementById('lobby-overlay').style.display !== 'none') {
    document.getElementById('lobby-overlay').style.display = 'none';
    // Apply slot config (who is bot)
    const slots = data.slots || {};
    for (let p = 1; p <= 4; p++) {
      // Slot absent or marked bot → bot; human slot that isn't mine → also treated as bot locally
      // (their moves arrive via lastMove listener)
      if (!slots[p] || slots[p].isBot) {
        if (GS) GS.playerStatus[p].isBot = true;
      } else {
        if (GS) GS.playerStatus[p].isBot = (p !== myPlayerNum);
      }
    }
  }

  // Difficulty chosen — start game
  if (data.difficulty && !GS) {
    _startGameInternal(data.difficulty);
  }

  // New move arrived
  const lm = data.lastMove;
  if (lm && lm._key !== lastMoveKey && GS && !GS.gameOver) {
    lastMoveKey = lm._key;
    if (lm.playerNum !== myPlayerNum) {
      executeTurn(lm.playerNum, lm.q, lm.r, !!lm.isDesperation);
    }
    // Bot turn: host computes
    if (isHost && GS && !GS.gameOver) {
      const cp = GS.currentPlayer;
      if (GS.playerStatus[cp].isBot) {
        setTimeout(() => computeAndSendBotMove(cp, roomId), 800);
      }
    }
  }
}

function updateLobbyPlayers(slots) {
  const icons = ['🔴','🔵','🟢','🟡'];
  const lines = [];
  for (let p = 1; p <= 4; p++) {
    const s = slots[p];
    if (!s) lines.push(`${icons[p-1]} 玩家${p}: 等待中...`);
    else if (s.isBot) lines.push(`${icons[p-1]} 玩家${p}: 🤖 Bot`);
    else lines.push(`${icons[p-1]} 玩家${p}: ${s.name}`);
  }
  document.getElementById('lobby-players').innerHTML = lines.join('<br>');
}

async function lobbyRequestStart() {
  if (!roomRef || !isHost) return;
  const { ref, update, db } = window._fb;
  // Fill remaining slots with bots
  const slots = {};
  for (let p = 2; p <= 4; p++) {
    // We'll check via a fresh read — but simple: write bot for any slot we haven't seen joined
    // Host will set in difficulty write
  }
  await update(roomRef, { gameStarted: true });
  // Host picks difficulty — show menu
  document.getElementById('menu-overlay').style.display = 'flex';
}

async function sendMove(playerNum, q, r, isDesperation) {
  if (!roomRef) return;
  const { update } = window._fb;
  const moveKey = Date.now().toString(36);
  lastMoveKey = moveKey;
  await update(roomRef, {
    lastMove: { playerNum, q, r, isDesperation: !!isDesperation, _key: moveKey }
  });
}

async function computeAndSendBotMove(playerNum, roomId) {
  if (!GS || GS.gameOver || GS.currentPlayer !== playerNum) return;
  const move = evaluateMoves(playerNum);
  if (move) await sendMove(playerNum, move.q, move.r, !!move.isDesperation);
}

// Internal game start (called once difficulty is known)
function _startGameInternal(diff) {
  currentDifficulty = diff;
  document.getElementById('menu-overlay').style.display = 'none';
  initGame();
  // Re-apply bot flags after initGame resets playerStatus
  // (handleRoomUpdate will fire again if needed — but call directly here too)
}

function handleHumanMoveMultiplayer(q, r) {
  if (!GS || GS.gameOver) return;
  const player = GS.currentPlayer;
  if (player !== myPlayerNum) { setStatus('唔係你嘅回合！'); return; }
  const validMoves = getValidMoves(player);
  const isValid = validMoves.find(m => m.q === q && m.r === r);
  if (isValid) { sendMove(player, q, r, false); return; }
  if (validMoves.length === 0) {
    const desp = getDesperationMoves(player);
    if (desp.find(m => m.q === q && m.r === r)) { sendMove(player, q, r, true); return; }
  }
  setStatus('無效落子！');
}

// Override startGame to write difficulty to Firebase (host only)
const _startGameOriginal = startGame;
window.startGame = async function(diff) {
  if (multiplayerMode && isHost && roomRef) {
    const { update } = window._fb;
    // Fill empty slots with bots before writing difficulty
    const botSlots = {};
    for (let p = 2; p <= 4; p++) botSlots[`slots/${p}`] = { name: `Bot${p}`, isBot: true };
    await update(roomRef, { ...botSlots, difficulty: diff });
    _startGameInternal(diff);
  } else {
    _startGameOriginal(diff);
  }
};
</script>
